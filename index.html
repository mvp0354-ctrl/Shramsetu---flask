{% extends "base.html" %}

{% block content %}
  <main class="layout layout--auth">
    <section class="card card--auth-panel">
      <div class="auth-tabs">
        <button type="button" class="auth-tab auth-tab--active" data-target="loginPanel">Login</button>
        <button type="button" class="auth-tab" data-target="signupPanel">Sign Up</button>
      </div>

      <section id="loginPanel" class="auth-panel-section auth-panel-section--active">
        <h3>Login</h3>
        <form method="post" class="form">
          <label>
            <span class="label-title"><span class="label-icon">@</span> Username</span>
            <input name="username" type="text" placeholder="Enter username" required>
          </label>
          <label>
            <span class="label-title"><span class="label-icon">PW</span> Password</span>
            <input name="password" type="password" placeholder="Enter password" required>
          </label>
          <label class="checkbox-row">
            <input name="remember_me" type="checkbox">
            <span>Remember Me</span>
          </label>
          <button type="submit" class="button button--primary">Login</button>
        </form>
      </section>

      <section id="signupPanel" class="auth-panel-section">
        <h3>Sign Up</h3>
        <form method="post" action="{{ url_for('signup') }}" class="form">
          <label>
            <span class="label-title"><span class="label-icon">RO</span> Role</span>
            <select name="role" id="signupRole" required>
              <option value="labour">Labour</option>
              <option value="contractor">Contractor</option>
              <option value="client">Client</option>
            </select>
          </label>
          <label>
            <span class="label-title"><span class="label-icon">NM</span> Full Name</span>
            <input name="full_name" type="text" placeholder="Enter full name" required>
          </label>
          <label>
            <span class="label-title"><span class="label-icon">☎</span> Mobile Number</span>
            <input name="phone" type="tel" placeholder="Enter mobile number">
          </label>
          <label>
            <span class="label-title" id="extraFieldLabel"><span class="label-icon" id="extraFieldIcon">CN</span> Contractor Name</span>
            <input name="company_name" id="extraFieldInput" type="text" placeholder="Enter contractor name">
          </label>
          <label>
            <span class="label-title"><span class="label-icon">@</span> Username</span>
            <input name="username" type="text" placeholder="Choose username" required>
          </label>
          <label>
            <span class="label-title"><span class="label-icon">PW</span> Password</span>
            <input name="password" type="password" placeholder="Create password" required>
          </label>
          <label>
            <span class="label-title"><span class="label-icon">OK</span> Confirm Password</span>
            <input name="confirm_password" type="password" placeholder="Confirm password" required>
          </label>
          <button type="submit" class="button button--primary">Sign Up</button>
        </form>
      </section>
    </section>
  </main>
  <script>
    const authTabs = document.querySelectorAll(".auth-tab");
    const authPanels = document.querySelectorAll(".auth-panel-section");
    const openPanelLinks = document.querySelectorAll("[data-open-panel]");
    const signupRole = document.getElementById("signupRole");
    const extraFieldLabel = document.getElementById("extraFieldLabel");
    const extraFieldIcon = document.getElementById("extraFieldIcon");
    const extraFieldInput = document.getElementById("extraFieldInput");

    function syncSignupField() {
      if (!signupRole || !extraFieldLabel || !extraFieldIcon || !extraFieldInput) {
        return;
      }

      if (signupRole.value === "contractor") {
        extraFieldLabel.innerHTML = '<span class="label-icon">CO</span> Company Name';
        extraFieldInput.placeholder = "For contractor signup only";
      } else if (signupRole.value === "labour") {
        extraFieldLabel.innerHTML = '<span class="label-icon">CN</span> Contractor Name';
        extraFieldInput.placeholder = "Enter contractor name";
      } else {
        extraFieldLabel.innerHTML = '<span class="label-icon">CO</span> Company Name';
        extraFieldInput.placeholder = "Optional";
      }
    }

    function setActivePanel(targetId) {
      authTabs.forEach((tab) => {
        tab.classList.toggle("auth-tab--active", tab.dataset.target === targetId);
      });
      authPanels.forEach((panel) => {
        panel.classList.toggle("auth-panel-section--active", panel.id === targetId);
      });
    }

    authTabs.forEach((tab) => {
      tab.addEventListener("click", () => setActivePanel(tab.dataset.target));
    });

    openPanelLinks.forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        setActivePanel(link.dataset.openPanel);
      });
    });

    if (signupRole) {
      signupRole.addEventListener("change", syncSignupField);
      syncSignupField();
    }
  </script>
{% endblock %}
